<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内容评分系统</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e5e5e5; min-height: 100vh; padding: 20px; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 20px; color: #fff; display: flex; align-items: center; gap: 8px; }
  .card { background: #1a1a1a; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #2a2a2a; }
  .card h2 { font-size: 14px; color: #888; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  label { display: block; font-size: 12px; color: #777; margin-bottom: 5px; }
  input, select, textarea { width: 100%; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; color: #e5e5e5; padding: 9px 11px; font-size: 13px; outline: none; transition: border-color 0.2s; font-family: inherit; }
  input:focus, select:focus, textarea:focus { border-color: #555; }
  textarea { resize: vertical; min-height: 100px; }
  select { cursor: pointer; }
  button { background: #fff; color: #000; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-secondary { background: #2a2a2a; color: #ccc; }
  .btn-danger { background: #3a1a1a; color: #f87171; }
  .result { display: none; margin-top: 16px; }
  .result.show { display: block; }
  .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .score-box { background: #111; border-radius: 8px; padding: 16px; text-align: center; border: 1px solid #222; }
  .score-number { font-size: 38px; font-weight: 800; color: #fff; line-height: 1; }
  .score-label { font-size: 11px; color: #666; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .breakdown { margin-top: 10px; }
  .breakdown-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #1a1a1a; font-size: 12px; color: #aaa; }
  .breakdown-item span:first-child { color: #666; }
  .prediction { margin-top: 14px; padding: 14px; border-radius: 8px; font-size: 14px; text-align: center; font-weight: 700; letter-spacing: 0.5px; }
  .prediction.爆 { background: #0d2a0d; color: #4ade80; border: 1px solid #1a4a1a; }
  .prediction.普通 { background: #2a2a0d; color: #facc15; border: 1px solid #4a4a1a; }
  .prediction.扑 { background: #2a0d0d; color: #f87171; border: 1px solid #4a1a1a; }
  .suggestions { margin-top: 14px; padding: 14px; background: #111; border-radius: 8px; font-size: 13px; line-height: 1.7; border: 1px solid #222; }
  .suggestions strong { color: #fff; }
  .risk { color: #f87171; }
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .tab { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer; color: #666; transition: all 0.15s; }
  .tab.active { background: #fff; color: #000; border-color: #fff; }
  .tab:hover:not(.active) { border-color: #555; color: #aaa; }
  .record-item { background: #111; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid #1a1a1a; }
  .record-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .record-title { font-size: 13px; color: #ccc; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .record-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .record-score { font-size: 20px; font-weight: 800; }
  .record-score.high { color: #4ade80; }
  .record-score.mid { color: #facc15; }
  .record-score.low { color: #f87171; }
  .record-meta { font-size: 11px; color: #555; margin-top: 5px; }
  .record-pred { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 6px; }
  .record-pred.爆 { background: #0d2a0d; color: #4ade80; }
  .record-pred.普通 { background: #2a2a0d; color: #facc15; }
  .record-pred.扑 { background: #2a0d0d; color: #f87171; }
  .record-actual { font-size: 11px; color: #888; }
  .record-actual.done { color: #4ade80; }
  .btn-sm { background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; padding: 5px 10px; font-size: 11px; border-radius: 6px; cursor: pointer; font-weight: 600; }
  .btn-sm:hover { border-color: #555; color: #ccc; }
  .feedback-form { display: none; margin-top: 10px; padding: 12px; background: #0a0a0a; border-radius: 8px; border: 1px solid #1a1a1a; }
  .feedback-form.show { display: block; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat-box { background: #111; border-radius: 8px; padding: 14px 10px; text-align: center; border: 1px solid #1a1a1a; }
  .stat-number { font-size: 22px; font-weight: 800; color: #fff; }
  .stat-label { font-size: 10px; color: #555; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-number.green { color: #4ade80; }
  .stat-number.yellow { color: #facc15; }
  .stat-number.red { color: #f87171; }
  .loading { text-align: center; padding: 30px; color: #555; font-size: 13px; }
  .section-title { font-size: 12px; color: #555; margin: 12px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .api-config { background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
  .api-config input { margin-bottom: 8px; }
  .api-status { font-size: 11px; margin-top: 6px; }
  .api-status.ok { color: #4ade80; }
  .api-status.fail { color: #f87171; }
  .evolution { margin-top: 14px; padding: 14px; background: #111; border-radius: 8px; border: 1px solid #1a3a1a; font-size: 12px; line-height: 1.8; }
  .evolution h4 { color: #4ade80; margin-bottom: 8px; font-size: 13px; }
  .evolution-item { padding: 4px 0; border-bottom: 1px solid #1a1a1a; display: flex; gap: 8px; }
  .evolution-item:last-child { border: none; }
  .evolution-tag { flex-shrink: 0; font-weight: 700; }
  .evolution-tag.pos { color: #4ade80; }
  .evolution-tag.neg { color: #f87171; }
  .empty { text-align: center; padding: 40px; color: #444; font-size: 13px; }
  .divider { border: none; border-top: 1px solid #222; margin: 14px 0; }
</style>
</head>
<body>
<div class="container">
  <h1>📊 内容评分系统</h1>

  <!-- API Config -->
  <div class="api-config">
    <label>Minimax API Key（调用 LLM 评分，留空使用规则引擎）</label>
    <input type="password" id="apiKey" placeholder="eyJ..." onchange="saveApiKey()">
    <div class="api-status" id="apiStatus"></div>
  </div>

  <!-- Scoring Card -->
  <div class="card">
    <h2>✏️ 打分</h2>
    <div class="row" style="margin-bottom:10px">
      <div>
        <label>平台</label>
        <select id="platform">
          <option value="aitoollab-seo">🌐 AiToollab SEO</option>
          <option value="gzh">📝 公众号</option>
          <option value="xiaohongshu">📕 小红书</option>
          <option value="zhihu">💬 知乎</option>
        </select>
      </div>
      <div>
        <label>Slug（唯一标识）</label>
        <input id="slug" placeholder="如: ai-video-side-hustle">
      </div>
    </div>
    <div style="margin-bottom:10px">
      <label>标题</label>
      <input id="title" placeholder="输入文章标题">
    </div>
    <div style="margin-bottom:12px">
      <label>内容摘要（可选）</label>
      <textarea id="content" placeholder="粘贴文章开头或正文摘要，可得更准评分"></textarea>
    </div>
    <button id="scoreBtn" onclick="doScore()">🎯 开始评分</button>

    <div id="result" class="result">
      <hr class="divider">
      <div class="score-grid">
        <div class="score-box">
          <div class="score-number" id="titleScoreNum">-</div>
          <div class="score-label">标题得分</div>
        </div>
        <div class="score-box">
          <div class="score-number" id="contentScoreNum">-</div>
          <div class="score-label">内容得分</div>
        </div>
      </div>

      <div class="breakdown" id="breakdown"></div>
      <div class="prediction" id="prediction"></div>
      <div class="suggestions" id="suggestions"></div>

      <div style="margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap;">
        <button id="saveBtn" onclick="saveRecord()">💾 保存记录</button>
        <button class="btn-secondary" onclick="clearResult()">清空</button>
      </div>
    </div>
  </div>

  <!-- Analysis Card -->
  <div class="card">
    <h2>📈 趋势分析</h2>
    <div class="stat-grid" id="statGrid"></div>
    <button class="btn-secondary" onclick="loadAnalysis()">🔄 刷新</button>
    <div id="evolutionBox"></div>
  </div>

  <!-- History Card -->
  <div class="card">
    <h2>📋 历史记录</h2>
    <div class="tabs">
      <div class="tab active" data-filter="all">全部</div>
      <div class="tab" data-filter="aitoollab-seo">SEO</div>
      <div class="tab" data-filter="gzh">公众号</div>
      <div class="tab" data-filter="pending">待复盘</div>
      <div class="tab" data-filter="done">已复盘</div>
    </div>
    <div id="recordsBox"></div>
  </div>
</div>

<script>
// ─── Storage ───────────────────────────────────────────────────────────────
const STORAGE_KEY = 'content_scores_v1';

function getRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// ─── API Key ───────────────────────────────────────────────────────────────
function saveApiKey() {
  localStorage.setItem('minimax_api_key', document.getElementById('apiKey').value.trim());
  checkApiKey();
}

function getApiKey() {
  return localStorage.getItem('minimax_api_key') || '';
}

function checkApiKey() {
  const key = getApiKey();
  const el = document.getElementById('apiStatus');
  if (!key) {
    el.textContent = '未配置 API Key，使用规则引擎评分（无需外网）';
    el.className = 'api-status';
  } else {
    el.textContent = '✓ API Key 已配置，使用 LLM 评分';
    el.className = 'api-status ok';
  }
  document.getElementById('apiKey').value = key;
}

// ─── Rule-based scoring (fallback) ──────────────────────────────────────────
function ruleScore(title, content) {
  let titleScore = 5;
  const titleLower = title.toLowerCase();
  const tips = [];

  // Positive signals
  if (/[0-9]+/.test(title)) { titleScore += 1.5; tips.push('✓ 含数字'); }
  if (/[吗？是不是|怎么|如何|为什么|！|？]/.test(title)) { titleScore += 1; tips.push('✓ 含疑问/感叹'); }
  if (/(免费|省钱|赚钱|变现|副业|兼职|捡漏)/.test(title)) { titleScore += 1.5; tips.push('✓ 变现相关'); }
  if (/(测评|对比|评测|实测|体验)/.test(title)) { titleScore += 0.8; tips.push('✓ 测评类'); }
  if (/(教程|指南|方法|技巧|攻略|神器)/.test(title)) { titleScore += 0.8; tips.push('✓ 教程类'); }
  if (/[\[【【]/.test(title)) { titleScore += 0.5; tips.push('✓ 含括号'); }
  if (/真实的?|经验|踩坑|翻车|教训/.test(title)) { titleScore += 0.5; tips.push('✓ 真实体验'); }
  // Negative signals
  if (title.length > 35) { titleScore -= 0.5; tips.push('⚠ 标题偏长'); }
  if (/本质上|说白了|换句话说|毫无疑问/.test(title)) { titleScore -= 1; tips.push('✗ AI味/套话'); }

  titleScore = Math.max(1, Math.min(10, titleScore));

  let contentScore = 5;
  if (content) {
    if (content.length > 200) contentScore += 1;
    if (/第一[、，]第二|其次|最后/.test(content)) contentScore -= 1;
    if (/综上所述|不难发现|值得注意的是/.test(content)) contentScore -= 1;
    if (/[吗呢吧呀啊]/.test(content)) contentScore += 0.5;
  }

  contentScore = Math.max(1, Math.min(10, contentScore));

  const pred = titleScore >= 7.5 ? '爆' : titleScore < 6 ? '扑' : '普通';
  const predReason = pred === '爆' ? '标题含多个爆款元素' : pred === '扑' ? '标题缺乏情绪钩子或变现词' : '标题信息密度一般';

  return {
    title_score: Math.round(titleScore * 10) / 10,
    content_score: Math.round(contentScore * 10) / 10,
    title_breakdown: {
      '数字/痛点': Math.round(Math.min(10, titleScore + 0.5) * 10) / 10,
      '情绪钩子': Math.round(Math.min(10, titleScore + (title.includes('!') || title.includes('？') ? 1 : -0.5)) * 10) / 10,
      '搜索意图': Math.round(Math.min(10, titleScore + (title.includes('如何') || title.includes('怎么') ? 1 : 0)) * 10) / 10,
      '具体性': Math.round(Math.min(10, titleScore - (title.length > 30 ? 0.5 : 0)) * 10) / 10,
    },
    content_breakdown: { '信息密度': contentScore, '可读性': contentScore, 'CTA': contentScore - 0.5, '开头钩子': contentScore },
    optimization_suggestions: tips.length > 0 ? tips : ['建议加入具体数字、变现词或疑问句'],
    risk_warning: titleScore < 6 ? '标题可能吸引力不足，建议加强痛点或情绪' : '',
    prediction: pred,
    prediction_reason: predReason,
  };
}

// ─── LLM Scoring ────────────────────────────────────────────────────────────
async function llmScore(title, platform, content) {
  const apiKey = getApiKey();
  if (!apiKey) return ruleScore(title, content);

  const response = await fetch('https://api.minimax.chat/v1/text/chatcompletion_pro', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: 'MiniMax-Text-01',
      messages: [
        {
          role: 'system',
          content: `你是专业内容评分师。根据标题和平台打分（1-10分），判断是否会爆。

评分标准(标题)：痛点明确30%、数字/具体25%、情绪钩子25%、搜索意图20%
评分标准(内容)：开头钩子25%、信息密度30%、结尾CTA20%、可读性25%

输出JSON：
{
  "title_score": X,
  "content_score": X, 
  "title_breakdown": {"痛点明确":X,"数字/具体":X,"情绪钩子":X,"搜索意图":X},
  "content_breakdown": {"开头钩子":X,"信息密度":X,"结尾CTA":X,"可读性":X},
  "optimization_suggestions": ["建议1","建议2"],
  "risk_warning": "风险提示",
  "prediction": "爆/普通/扑",
  "prediction_reason": "原因"
}`
        },
        {
          role: 'user',
          content: `标题：${title}\n平台：${platform}\n${content ? '内容：' + content.slice(0, 400) : '(暂无内容)'}`
        }
      ],
      temperature: 0.3
    })
  });

  if (!response.ok) {
    throw new Error(`API error: ${response.status}`);
  }

  const data = await response.json();
  const text = data.choices?.[0]?.message?.content || '';
  const match = text.match(/\{[\s\S]*\}/);
  if (match) return JSON.parse(match[0]);
  return ruleScore(title, content);
}

// ─── UI Actions ─────────────────────────────────────────────────────────────
let currentScore = null;

async function doScore() {
  const btn = document.getElementById('scoreBtn');
  const title = document.getElementById('title').value.trim();
  const platform = document.getElementById('platform').value;
  const content = document.getElementById('content').value.trim();

  if (!title) { alert('请输入标题'); return; }

  btn.disabled = true;
  btn.textContent = '⏳ 评分中...';
  document.getElementById('result').classList.remove('show');

  try {
    const data = await llmScore(title, platform, content);
    currentScore = { title, platform, content, ...data };
    renderResult(data);
  } catch(e) {
    alert('评分失败: ' + e.message + '\n\n已使用规则引擎评分');
    const fallback = ruleScore(title, content);
    currentScore = { title, platform, content, ...fallback };
    renderResult(fallback);
  } finally {
    btn.disabled = false;
    btn.textContent = '🎯 开始评分';
  }
}

function renderResult(data) {
  document.getElementById('titleScoreNum').textContent = data.title_score ?? '-';
  document.getElementById('contentScoreNum').textContent = data.content_score ?? '-';

  // Breakdown
  let bd = '<div class="breakdown">';
  if (data.title_breakdown) {
    bd += '<div class="section-title">标题维度</div>';
    for (const [k, v] of Object.entries(data.title_breakdown)) {
      bd += `<div class="breakdown-item"><span>${k}</span><span>${v}/10</span></div>`;
    }
  }
  if (data.content_breakdown) {
    bd += '<div class="section-title">内容维度</div>';
    for (const [k, v] of Object.entries(data.content_breakdown)) {
      bd += `<div class="breakdown-item"><span>${k}</span><span>${v}/10</span></div>`;
    }
  }
  bd += '</div>';
  document.getElementById('breakdown').innerHTML = bd;

  // Prediction
  const predClass = (data.prediction || '普通').includes('爆') ? '爆' : (data.prediction || '普通').includes('扑') ? '扑' : '普通';
  const predEl = document.getElementById('prediction');
  predEl.className = `prediction ${predClass}`;
  predEl.textContent = `${data.prediction || ''} — ${data.prediction_reason || ''}`;

  // Suggestions
  let sug = '<strong>优化建议：</strong><br>';
  if (data.optimization_suggestions?.length) {
    sug += data.optimization_suggestions.map(s => '• ' + s).join('<br>');
  }
  if (data.risk_warning) {
    sug += `<br><span class="risk"><strong>⚠ 风险：</strong>${data.risk_warning}</span>`;
  }
  document.getElementById('suggestions').innerHTML = `<div class="suggestions">${sug}</div>`;

  document.getElementById('result').classList.add('show');
}

function saveRecord() {
  if (!currentScore) return;
  const slug = document.getElementById('slug').value.trim() ||
    currentScore.title.slice(0, 30).replace(/[^a-z0-9\u4e00-\u9fa5-]/gi, '-').toLowerCase();

  const records = getRecords();
  records.unshift({
    id: generateId(),
    date: new Date().toISOString().slice(0, 10),
    platform: currentScore.platform,
    slug,
    title_original: currentScore.title,
    title_score: currentScore.title_score,
    content_score: currentScore.content_score,
    prediction: currentScore.prediction,
    prediction_note: currentScore.prediction_reason || '',
    actual_result: '',
    actual_date: '',
    status: 'pending'
  });

  saveRecords(records);
  alert('已保存！');
  loadRecords();
  loadAnalysis();
}

function clearResult() {
  currentScore = null;
  document.getElementById('result').classList.remove('show');
  document.getElementById('title').value = '';
  document.getElementById('content').value = '';
}

// ─── Records ────────────────────────────────────────────────────────────────
let currentFilter = 'all';

function filterRecords(filter) {
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-filter="${filter}"]`)?.classList.add('active');
  loadRecords();
}

async function loadRecords() {
  const records = getRecords();
  const box = document.getElementById('recordsBox');

  let filtered = records;
  if (currentFilter === 'pending') filtered = records.filter(r => r.status === 'pending');
  else if (currentFilter === 'done') filtered = records.filter(r => r.status === 'done');
  else if (currentFilter !== 'all') filtered = records.filter(r => r.platform === currentFilter);

  if (filtered.length === 0) {
    box.innerHTML = '<div class="empty">暂无记录 — 先打一次分试试</div>';
    return;
  }

  box.innerHTML = filtered.slice(0, 50).map(r => {
    const scoreClass = r.title_score >= 7 ? 'high' : r.title_score < 6 ? 'low' : 'mid';
    const isDone = r.status === 'done';
    return `
      <div class="record-item">
        <div>
          <div class="record-title" title="${r.title_original}">${r.title_original}</div>
          <div class="record-meta">
            <span class="record-pred ${r.prediction}">${r.prediction || ''}</span>
            ${r.platform} · ${r.date}
            ${isDone ? `<span class="record-actual done"> → ${r.actual_result}（${r.actual_date}）</span>` : '<span class="record-actual">⏳ 待复盘</span>'}
          </div>
        </div>
        <div class="record-right">
          <span class="record-score ${scoreClass}">${r.title_score}</span>
          <button class="btn-sm" onclick="toggleFeedback('${r.id}')">复盘</button>
        </div>
      </div>
      <div class="feedback-form" id="fb-${r.id}">
        <label>实际结果：</label>
        <div class="row3" style="margin:8px 0">
          <button class="btn-sm" onclick="submitFeedback('${r.id}', '爆')" style="background:#0d2a0d;color:#4ade80;border-color:#1a4a1a">🔥 爆</button>
          <button class="btn-sm" onclick="submitFeedback('${r.id}', '普通')" style="background:#2a2a0d;color:#facc15;border-color:#4a4a1a">➖ 普通</button>
          <button class="btn-sm" onclick="submitFeedback('${r.id}', '扑')" style="background:#2a0d0d;color:#f87171;border-color:#4a1a1a">💨 扑</button>
        </div>
      </div>
    `;
  }).join('');
}

function toggleFeedback(id) {
  document.querySelectorAll('.feedback-form').forEach(el => el.classList.remove('show'));
  document.getElementById('fb-' + id)?.classList.toggle('show');
}

function submitFeedback(id, result) {
  const records = getRecords();
  const idx = records.findIndex(r => r.id === id);
  if (idx === -1) return;
  records[idx].actual_result = result;
  records[idx].actual_date = new Date().toISOString().slice(0, 10);
  records[idx].status = 'done';
  saveRecords(records);
  loadRecords();
  loadAnalysis();
}

// ─── Analysis ───────────────────────────────────────────────────────────────
function loadAnalysis() {
  const records = getRecords();
  const total = records.length;
  const pending = records.filter(r => r.status === 'pending').length;
  const done = records.filter(r => r.status === 'done');
  const analyzed = done.length;

  const avgTitle = analyzed > 0 ? (done.reduce((s, r) => s + r.title_score, 0) / analyzed).toFixed(1) : '-';
  const avgContent = analyzed > 0 ? (done.reduce((s, r) => s + r.content_score, 0) / analyzed).toFixed(1) : '-';

  document.getElementById('statGrid').innerHTML = `
    <div class="stat-box"><div class="stat-number">${total}</div><div class="stat-label">总记录</div></div>
    <div class="stat-box"><div class="stat-number yellow">${pending}</div><div class="stat-label">待复盘</div></div>
    <div class="stat-box"><div class="stat-number green">${analyzed}</div><div class="stat-label">已复盘</div></div>
    <div class="stat-box"><div class="stat-number">${avgTitle}</div><div class="stat-label">均分(标)</div></div>
  `;

  // Evolution insights
  if (analyzed >= 5) {
    const highScoreLow = done.filter(r => r.title_score >= 7 && r.actual_result !== '爆');
    const lowScoreHigh = done.filter(r => r.title_score < 6 && r.actual_result === '爆');

    let evol = '<div class="evolution"><h4>🧬 公式进化洞察</h4>';
    if (highScoreLow.length > 0) {
      evol += '<div class="section-title" style="color:#f87171">⚠ 高分开扑（假阳性）</div>';
      highScoreLow.forEach(r => {
        evol += `<div class="evolution-item"><span class="evolution-tag neg">${r.title_score}分→${r.actual_result}</span><span>${r.title_original.slice(0, 40)}</span></div>`;
      });
    }
    if (lowScoreHigh.length > 0) {
      evol += '<div class="section-title" style="color:#4ade80;margin-top:8px">🌿 低分爆款（假阴性）</div>';
      lowScoreHigh.forEach(r => {
        evol += `<div class="evolution-item"><span class="evolution-tag pos">${r.title_score}分→${r.actual_result}</span><span>${r.title_original.slice(0, 40)}</span></div>`;
      });
    }
    if (highScoreLow.length === 0 && lowScoreHigh.length === 0) {
      evol += '<div style="color:#555;font-size:12px">积累更多复盘数据后，这里会显示规律洞察</div>';
    }
    evol += '</div>';
    document.getElementById('evolutionBox').innerHTML = evol;
  } else {
    document.getElementById('evolutionBox').innerHTML = `<div class="evolution"><div style="color:#555;font-size:12px">已有 ${analyzed} 条复盘数据，继续积累到 5 条以上解锁进化洞察</div></div>`;
  }
}

// ─── Tab click ──────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => filterRecords(tab.dataset.filter));
});

// ─── Init ───────────────────────────────────────────────────────────────────
checkApiKey();
loadRecords();
loadAnalysis();
</script>
</body>
</html>
