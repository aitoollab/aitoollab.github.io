<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系购买｜AiToollab</title>
    <meta name="description" content="联系AiToollab获取AI副业提示词包，或咨询AI副业相关问题。">
    <meta name="robots" content="noindex, nofollow">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; font-size: 16px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 48px; max-width: 500px; width: 90%; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 16px; color: var(--green); }
        p { color: var(--muted); margin-bottom: 12px; font-size: 15px; }
        .contact-item { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); border-radius: 10px; padding: 20px; margin: 20px 0; }
        .contact-item .label { color: var(--green); font-size: 13px; margin-bottom: 6px; }
        .contact-item .value { font-size: 18px; font-weight: 700; color: var(--text); }
        .note { color: #475569; font-size: 12px; margin-top: 24px; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <h1>🚀 购买提示词包</h1>
    <p>扫码联系AiToollab，注明"购买提示词包"<br>付款后24小时内发货</p>

    <div class="contact-item">
        <div class="label">微信号 / 微信二维码</div>
        <div class="value">aitoollab</div>
    </div>

    <div class="contact-item">
        <div class="label">GitHub</div>
        <div class="value"><a href="https://github.com/AiToollab">github.com/AiToollab</a></div>
    </div>

    <p style="margin-top:24px;">或扫描下方公众号/微信二维码联系：</p>
    <p style="color:#475569; font-size:13px;">（微信：aitoollab，备注：提示词包）</p>

    <p class="note">提示词包为数字内容产品，一经发货不支持退款。<br>所有提示词均经实测验证，直接可用。</p>

    <p style="margin-top:16px;">
        <a href="https://aitoollab.github.io/">← 返回主站</a>
    </p>
</div>
</body>
</html>
